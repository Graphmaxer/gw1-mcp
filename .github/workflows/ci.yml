name: CI
on:
  push:
    branches: [main]
  pull_request:
# Least privilege: CI only reads the repo. Fork PRs get a read-only token
# from GitHub regardless; this makes the same guarantee explicit for pushes.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm --filter @gw1-mcp/gw-worker check
