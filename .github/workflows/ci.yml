name: CI
on:
  push:
    branches: [main]
  pull_request:
# Least privilege: CI only reads the repo. Fork PRs get a read-only token
# from GitHub regardless; this makes the same guarantee explicit for pushes.
permissions:
  contents: read

jobs:
  # Prove the declared engines floor (Node >=22) actually works: tests +
  # typecheck on 22, without the coverage/Codecov tooling the 24 job carries
  # (GW1-11). Fast guard against accidentally using a 23+-only API.
  test-node22:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      # No version here: pnpm/action-setup reads the packageManager field
      # from package.json (specifying both makes the action fail).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm -r typecheck
      - name: C++ plugin core tests (pure functions, GWCA-free)
        # The game-dependent 80% of the plugin is only validatable in-game
        # (debt #2); the pure core (JSON escaping, hero table, skill-unlock
        # bitfield decoding) is tested here on every PR in under a second.
        # The Windows plugin workflow keeps proving MSVC /W4 /WX integration.
        run: |
          pip install --quiet gcovr
          g++ -std=c++20 --coverage -Wall -Wextra -Werror -o core_tests gwtoolbox-plugin/tests/core_tests.cpp
          ./core_tests
          gcovr --lcov cpp-coverage.lcov --filter 'gwtoolbox-plugin/'
          rm -f core_tests ./*.gcda ./*.gcno
      - name: Tests (with lcov coverage for Codecov)
        # Also runs the MCP Registry schema validation (registry-schema.test.ts).
        run: pnpm -r run test --coverage.enabled=true --coverage.reporter=lcov --coverage.reporter=text --reporter=default --reporter=junit --outputFile.junit=test-report.junit.xml
      - name: Prefix lcov paths with their package (vitest emits package-relative SF)
        # All four packages emit `SF:src/...` — without the prefix, Codecov
        # cannot map files to `packages/*/src/**` and the component statuses
        # match nothing (the original cause of failing targets).
        run: |
          for p in gw-template gw-data gw-mcp gw-worker; do
            sed -i "s|^SF:|SF:packages/$p/|" "packages/$p/coverage/lcov.info"
          done
      - name: Upload coverage to Codecov
        # SHA-pinned like every other action — this is the vendor of the 2021
        # bash-uploader supply-chain incident; the signed action replaced it,
        # the pin removes the moving-tag risk. Token is upload-only (low value).
        # Skipped when the token is absent (Dependabot PRs run without repo
        # secrets by design) so it doesn't leave a never-resolving status.
        if: ${{ env.HAS_CODECOV == 'true' }}
        env:
          HAS_CODECOV: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7 (embeds github-script v8 / Node 24; v5 line still ships v7.0.1)
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/gw-template/coverage/lcov.info,packages/gw-data/coverage/lcov.info,packages/gw-mcp/coverage/lcov.info,packages/gw-worker/coverage/lcov.info,cpp-coverage.lcov
          fail_ci_if_error: false
      - name: Upload test results to Codecov (Test Analytics)
        # !cancelled(): failed test runs must still upload — that IS the point
        # (failed-test annotations in PR comments, flaky detection). Our only
        # network-dependent test (registry-schema) is the one worth watching.
        # Same token guard as above.
        if: ${{ !cancelled() && env.HAS_CODECOV == 'true' }}
        env:
          HAS_CODECOV: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7 (embeds github-script v8 / Node 24; v5 line still ships v7.0.1)
        with:
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/gw-template/test-report.junit.xml,packages/gw-data/test-report.junit.xml,packages/gw-mcp/test-report.junit.xml,packages/gw-worker/test-report.junit.xml
      - run: pnpm --filter @gw1-mcp/gw-worker check
      - name: Lint workflows (actionlint)
        # Catches invalid workflow expressions (e.g. inputs.* in a job-level
        # permissions block) before they reach main.
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0 (embeds github-script v9 / Node 24)
