name: Update game data
on:
  schedule:
    - cron: "17 6 * * 1" # weekly (Mondays) — upstream tracks Reforged balance patches
  workflow_dispatch:

# SUPPLY-CHAIN ISOLATION (two jobs on purpose): the import step executes an
# UNPINNED remote bundle from the upstream's GitHub Pages (see import.ts).
# That code must never run in a job that can mint the app token — a compromised
# upstream could exfiltrate the job's secrets. So: `import` runs with zero
# secrets and a read-only token, and hands the data diff to `open-pr` as an
# artifact; only `open-pr` (which runs no remote code) touches the PAT.
permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      # No version here: pnpm/action-setup reads the packageManager field
      # from package.json (specifying both makes the action fail).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Import latest upstream data
        # `pnpm import` is a pnpm builtin (lockfile import); our script must be
        # invoked with `run`. URL after `--` so it reaches the script, not pnpm.
        # Try tip-fresh Pages; on any failure fall back to the pinned npm
        # package so the weekly job never breaks on a fragile external surface.
        run: |
          pnpm --filter @gw1-mcp/gw-data run import:data -- https://build-wars.github.io/gw-skilldata \
            || { echo "::warning::Pages import failed; importing from the pinned npm package"; \
                 pnpm --filter @gw1-mcp/gw-data run import:data; }
      - name: Regenerate heroes.json from the GWCA HeroID enum + curated overlay
        run: pnpm --filter @gw1-mcp/gw-data import:heroes
      - name: Check for meaningful changes (ignore import date)
        id: diff
        run: |
          if git diff --numstat -- packages/gw-data/data gwtoolbox-plugin/AccountExport/hero-names.generated.h | grep -v "_meta.json" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            git checkout -- packages/gw-data/data/_meta.json || true
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm -r test
        if: steps.diff.outputs.changed == 'true'
      - name: Upload the data diff as an artifact
        if: steps.diff.outputs.changed == 'true'
        run: git diff -- packages/gw-data/data gwtoolbox-plugin/AccountExport/hero-names.generated.h > /tmp/data-update.patch
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: steps.diff.outputs.changed == 'true'
        with:
          name: data-update
          path: /tmp/data-update.patch
          retention-days: 3

  open-pr:
    needs: import
    if: needs.import.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mint an ephemeral app token (gw1-mcp-bot)
        # Same App as release-please; the token lives ~1h. The PR is authored
        # by gw1-mcp-bot, so CI/CodeQL trigger normally on it.
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          # Client ID (a string, not the numeric App ID) is the non-deprecated
          # input as of create-github-app-token v3.1; stored as a repo var since
          # it is not secret (visible on the App's settings page). The old
          # (the legacy numeric AUTOMATION_APP_ID secret is no longer referenced).
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: data-update
          path: /tmp
      - name: Apply the imported data
        run: git apply /tmp/data-update.patch
      # Descriptions travel verbatim into an LLM's context via get_skill and
      # search_skills, so a vandalised upstream needs no code execution to attack
      # a consumer, and no invariant test can catch it: the suite checks ids and
      # types, never the meaning of free text.
      #
      # Flagging *any* description change was measured against upstream history
      # and rejected: 97% of descriptions embed the numbers a balance patch
      # edits, and legitimate commits reword text wholesale (6e05969 changed 301
      # description fields at once). A gate that fires weekly is rubber-stamping.
      # This flags added text instead — the shape an injected instruction has —
      # at a threshold no commit in upstream history would have tripped.
      - name: Flag suspicious description growth (prompt-injection channel)
        id: desc
        # Bare node: this job has no pnpm install and must not gain one (it holds
        # contents:write). The script has zero dependencies for that reason.
        run: node packages/gw-data/scripts/check-description-growth.mjs >> "$GITHUB_OUTPUT"
      - name: Open pull request
        id: data-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/update-game-data
          title: "chore: update game data from upstream"
          commit-message: "chore: update game data from build-wars/gw-skilldata"
          body: |
            Automated re-import from build-wars/gw-skilldata (Reforged-tracking upstream) detected changes.
            Review the diff in `packages/gw-data/data/`.

            CI runs the full golden-fixture suite against the new data.

            Suspicious description growth: ${{ steps.desc.outputs.changed }}.
            When true, auto-merge is withheld: a description gained more added
            text than any legitimate upstream commit ever has, and that text
            reaches an LLM's context verbatim. Read the description diff — the
            job log names the skills. Numeric balance edits and upstream
            rewording do not trip this.

      - name: Enable auto-merge (zero-touch when CI passes, numeric diffs only)
        if: ${{ steps.data-pr.outputs.pull-request-number && steps.desc.outputs.changed == 'false' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge ${{ steps.data-pr.outputs.pull-request-number }} --auto --squash
