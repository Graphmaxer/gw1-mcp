name: Build GWToolbox plugin

# Single source of truth for compiling AccountExport.dll on a Windows runner.
# Three entry points, one build:
#   - workflow_dispatch: manual build, DLL published as a run artifact
#   - push on the plugin path: CI check that it still compiles
#   - workflow_call (release_tag input): the release run calls this and the
#     DLL is uploaded straight onto the GitHub release
# Mirrors upstream GWToolboxpp CI: vcpkg pinned to their commit, `vcpkg`
# CMake preset (Win32 baked in), binaries in <src>/bin/RelWithDebInfo/.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "gwtoolbox-plugin/**"
      - ".github/workflows/build-gwtoolbox-plugin.yml"
  workflow_call:
    inputs:
      release_tag:
        description: "If set, upload the built DLL onto this GitHub release."
        type: string
        required: false

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    # Build runs with contents:read only. Compiling unpinned upstream code in a
    # contents:write job (GW1-04) would let an upstream compromise touch our
    # releases; the privileged release upload is a separate minimal job below,
    # fed through a run artifact.
    permissions:
      contents: read
    env:
      VCPKG_COMMIT: ce613c41372b23b1f51333815feb3edd87ef8a8b
      # Pinned to a verified GWToolboxpp commit instead of a floating master
      # clone (GW1-04). Bump deliberately after reviewing upstream changes.
      GWTOOLBOX_COMMIT: ca20ae743551fd24f4fd0653e8a64d5e5b55a820
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Checkout GWToolboxpp (pinned commit)
        shell: bash
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/gwdevhub/GWToolboxpp.git GWToolboxpp
          cd GWToolboxpp
          git checkout "$GWTOOLBOX_COMMIT"

      - name: Inject AccountExport plugin
        shell: pwsh
        run: |
          Copy-Item -Recurse gwtoolbox-plugin/AccountExport GWToolboxpp/plugins/AccountExport
          Add-Content GWToolboxpp/cmake/gwtoolboxdll_plugins.cmake "`nadd_tb_plugin(AccountExport)"

      - name: Cache vcpkg toolchain
        id: cache-vcpkg-tool
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-tool-${{ runner.os }}-${{ env.VCPKG_COMMIT }}

      - name: Install vcpkg
        if: steps.cache-vcpkg-tool.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$VCPKG_COMMIT"
          ./bootstrap-vcpkg.bat

      - name: Set VCPKG_ROOT
        shell: powershell
        run: echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

      - name: Restore vcpkg binary cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-bin-${{ runner.os }}-${{ hashFiles('GWToolboxpp/vcpkg.json', 'GWToolboxpp/vcpkg-configuration.json', 'GWToolboxpp/vcpkg-overlays/**') }}
          restore-keys: |
            vcpkg-bin-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ github.workspace }}/GWToolboxpp/build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('GWToolboxpp/cmake/*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Configure CMake (vcpkg preset, Win32)
        shell: bash
        working-directory: GWToolboxpp
        run: cmake . --preset=vcpkg
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"

      - name: Build AccountExport
        shell: bash
        working-directory: GWToolboxpp
        run: cmake --build build --config RelWithDebInfo --target AccountExport

      - name: Collect artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          Get-ChildItem -Recurse GWToolboxpp/bin -Include AccountExport.dll, AccountExport.pdb |
            Copy-Item -Destination out
          Get-ChildItem out

      - name: Upload AccountExport.dll (run artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: AccountExport
          path: out/
          if-no-files-found: error

  # Privileged upload isolated from the build: contents:write, no upstream code,
  # only downloads the artifact the build produced and attaches it (GW1-04).
  release-upload:
    needs: build
    if: ${{ inputs.release_tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built DLL artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: AccountExport
          path: out/
      - name: Attach AccountExport.dll to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" out/AccountExport.dll --clobber
