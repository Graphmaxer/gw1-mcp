# Coverage policy (took over from the deleted coverage-summary.mjs floors).
# Component-level targets track src-only coverage per package; scripts are
# untested by design (see CLAUDE.md). Raise targets as coverage improves;
# never lower without a written why.
# wait_for_ci: false is REQUIRED for bot-pushed commits (gw1-mcp-bot release
# PRs): with the default (true), Codecov processes uploads but never sends
# statuses/comments. Correlation is now 2/2 (removed 07-15 -> silence
# returned on the next bot PR; present -> notifications flow). Mechanism
# unknown, likely their CI-completion detection stalling on bot events —
# do NOT remove again without a Codecov support resolution in hand.
codecov:
  notify:
    wait_for_ci: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1% # tolerate noise, block real regressions
    patch:
      default:
        target: 80% # new lines in a PR should arrive mostly covered

component_management:
  individual_components:
    - component_id: gw-template
      paths: [packages/gw-template/src/**]
      statuses: [{ type: project, target: auto, threshold: 1% }]
    - component_id: gw-data
      paths: [packages/gw-data/src/**]
      statuses: [{ type: project, target: auto, threshold: 1% }]
    - component_id: gw-mcp
      paths: [packages/gw-mcp/src/**]
      statuses: [{ type: project, target: auto, threshold: 1% }]
    - component_id: gw-worker
      paths: [packages/gw-worker/src/**]
      statuses: [{ type: project, target: auto, threshold: 1% }]
    - component_id: gwtoolbox-core
      paths: [gwtoolbox-plugin/AccountExport/**]
      statuses: [{ type: project, target: auto, threshold: 1% }]

ignore:
  - "packages/*/scripts/**" # maintenance pipelines, untested by design
  - "packages/*/test/**"
  - "gwtoolbox-plugin/AccountExport/AccountExport.cpp" # game-dependent, in-game-only (debt #2)
  - "gwtoolbox-plugin/tests/**"
