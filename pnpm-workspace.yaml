packages:
  - "packages/*"
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
# @modelcontextprotocol/sdk@1.29.0 pins an internal @hono/node-server@1.19.14
# (a package.json dependency of the SDK itself, not ours to bump directly).
# That version has GHSA-frvp-7c67-39w9 (Windows path traversal in
# serve-static via encoded backslash). We don't call serveStatic anywhere
# and only ever run @hono/node-server locally for dev, so exposure is
# already ~nil, but there's no reason to leave a known-vulnerable transitive
# copy sitting in the tree when our own dependency is already >=2.0.10.
overrides:
  "@hono/node-server": "^2.0.10"
  # ajv@8.20.0 pulled in by @modelcontextprotocol/sdk itself pins a
  # vulnerable fast-uri (GHSA-v2hh-gcrm-f6hx, host confusion via a literal
  # backslash authority delimiter — a URI-parsing/SSRF-adjacent bug). Same
  # not-ours-to-bump situation as @hono/node-server above.
  "fast-uri": "^3.1.4"
  # sharp is pulled in by miniflare (wrangler's local Workers simulator,
  # dev-only — never runs in the deployed Cloudflare Worker) and inherits
  # several libvips CVEs below 0.35.0 (GHSA-f88m-g3jw-g9cj). Production
  # exposure is nil either way, but no reason to leave it unpatched locally.
  "sharp": "^0.35.0"
  # postcss <= 8.5.17 is reachable only through vitest -> vite (
  # GHSA-r28c-9q8g-f849, path traversal via a crafted previous source map).
  # Dev-only, zero production exposure — same reasoning as the three above, and
  # the same conclusion: no reason to keep a vulnerable copy in the tree.
  "postcss": "^8.5.18"
