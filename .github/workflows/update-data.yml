name: Update game data
on:
  schedule:
    - cron: "17 6 * * 1" # weekly (Mondays) — upstream tracks Reforged balance patches
  workflow_dispatch:
# create-pull-request needs to push a branch and open the PR when running
# on the fallback GITHUB_TOKEN (with DATA_BOT_PAT, the PAT carries these).
permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Import latest upstream data (published GitHub Pages release files)
        run: pnpm --filter @gw1-mcp/gw-data import https://build-wars.github.io/gw-skilldata
      - name: Regenerate heroes.json from the GWCA HeroID enum + curated overlay
        run: pnpm --filter @gw1-mcp/gw-data import:heroes
      - name: Check for meaningful changes (ignore import date)
        id: diff
        run: |
          if git diff --numstat -- packages/gw-data/data | grep -v "_meta.json" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            git checkout -- packages/gw-data/data/_meta.json || true
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm -r test
        if: steps.diff.outputs.changed == 'true'
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        id: data-pr
        uses: peter-evans/create-pull-request@v8
        with:
          # With DATA_BOT_PAT (fine-grained PAT: this repo, Contents RW +
          # Pull requests RW), the PR is authored by a real identity, so CI
          # and CodeQL trigger normally and auto-merge below completes the
          # zero-touch flow. Without it, falls back to GITHUB_TOKEN and the
          # close/reopen note in the PR body applies.
          token: ${{ secrets.DATA_BOT_PAT || github.token }}
          branch: chore/update-game-data
          title: "chore: update game data from upstream"
          commit-message: "chore: update game data from build-wars/gw1-database"
          body: |
            Automated re-import from build-wars/gw-skilldata (Reforged-tracking upstream) detected changes.
            Review the diff in `packages/gw-data/data/`.

            **Maintainer note — CI will NOT start by itself on this PR.**
            Bot-created PRs (GITHUB_TOKEN) never trigger `pull_request`
            workflows, and the branch ruleset requires the `test` check.
            **Close and reopen this PR** — the reopen event comes from you
            and starts CI, which runs the full golden-fixture suite against
            the new data.

      - name: Enable auto-merge (zero-touch when CI passes)
        if: ${{ steps.data-pr.outputs.pull-request-number && secrets.DATA_BOT_PAT != '' }}
        env:
          GH_TOKEN: ${{ secrets.DATA_BOT_PAT }}
        run: gh pr merge ${{ steps.data-pr.outputs.pull-request-number }} --auto --squash
