name: Publish to MCP Registry
# Publishes server.json metadata to the official MCP Registry
# (registry.modelcontextprotocol.io). Auth is GitHub OIDC — no secret needed;
# it grants publish rights on the io.github.graphmaxer/* namespace.
# Run manually after bumping the version in server.json, or cut a release.
on:
  workflow_dispatch:
  release:
    types: [published]
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_amd64.tar.gz" | tar xz
          sudo mv mcp-publisher /usr/local/bin/
      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc
      - name: Publish
        run: mcp-publisher publish server.json
