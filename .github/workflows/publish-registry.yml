name: Publish to MCP Registry

# Single source of truth for publishing server.json to the official MCP
# Registry (registry.modelcontextprotocol.io) via GitHub OIDC — no secret.
# Two entry points, one implementation:
#   - workflow_dispatch: manual (re)publish, e.g. after a registry preview
#     data reset, or to publish a release whose auto-run predates a fix
#   - workflow_call: the release run invokes this after creating a release
# The namespace io.github.Graphmaxer/* is case-sensitive and must match the
# GitHub username exactly (see server.json "name").
on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write # OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Best-effort: the registry is in preview; an outage must not fail a release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install mcp-publisher
        run: |
          arch=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${os}_${arch}.tar.gz" | tar xz mcp-publisher
      - name: Login (GitHub OIDC) and publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish server.json
