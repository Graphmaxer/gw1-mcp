name: Publish to MCP Registry

# Single source of truth for publishing server.json to the official MCP
# Registry (registry.modelcontextprotocol.io) via GitHub OIDC — no secret.
# Two entry points, one implementation:
#   - workflow_dispatch: manual (re)publish, e.g. after a registry preview
#     data reset, or to publish a release whose auto-run predates a fix
#   - workflow_call: the release run invokes this after creating a release
# The namespace io.github.Graphmaxer/* is case-sensitive and must match the
# GitHub username exactly (see server.json "name").
on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write # OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install mcp-publisher (pinned + digest-verified)
        # Pinned to a specific version with a checked SHA-256 instead of piping
        # `releases/latest` straight into tar in an OIDC job (GW1-05): a
        # compromised `latest` would otherwise run in our id-token context.
        # Bump VERSION + the two digests together when upgrading. Digests from
        # the v1.8.0 release assets (also Sigstore-signed upstream).
        env:
          VERSION: v1.8.0
          SHA256_amd64: 1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf
          SHA256_arm64: c978982c60e1b4903a976de090f04dc4fac4a320daa50704fcad2dbc93433d62
        run: |
          set -euo pipefail
          arch=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          expected=$(eval echo "\$SHA256_${arch}")
          curl --fail --show-error --location \
            "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/mcp-publisher_${os}_${arch}.tar.gz" \
            -o mcp-publisher.tar.gz
          echo "${expected}  mcp-publisher.tar.gz" | sha256sum --check --strict
          tar xzf mcp-publisher.tar.gz mcp-publisher
      - name: Login (GitHub OIDC) and publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish server.json
