name: CI
on:
  push:
    branches: [main]
  pull_request:
# Least privilege: CI only reads the repo. Fork PRs get a read-only token
# from GitHub regardless; this makes the same guarantee explicit for pushes.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # No version here: pnpm/action-setup reads the packageManager field
      # from package.json (specifying both makes the action fail).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm -r typecheck
      - run: pnpm -r test # includes the MCP Registry schema validation (registry-schema.test.ts)
      - run: pnpm --filter @gw1-mcp/gw-worker check
      - name: Lint workflows (actionlint)
        # Catches invalid workflow expressions (e.g. inputs.* in a job-level
        # permissions block) before they reach main.
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2
