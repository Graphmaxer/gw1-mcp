name: Upstream pin drift check

# The three manual pins Dependabot cannot see (they live in workflow env:/run:,
# not a manifest) drift silently. This monthly job compares each against
# upstream latest and opens ONE issue listing every drift — the active
# tripwire the honest register refers to. It never edits anything itself:
# bumping mcp-publisher means new digests, which a human must fetch and verify.

on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Compare pins against upstream latest
        id: drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          drift=""

          pinned_gwtb=$(grep -oP 'GWTOOLBOX_COMMIT:\s*\K[0-9a-f]+' \
            .github/workflows/build-gwtoolbox-plugin.yml)
          latest_gwtb=$(gh api repos/gwdevhub/GWToolboxpp/commits/master --jq '.sha')
          if [ "$pinned_gwtb" != "$latest_gwtb" ]; then
            drift="${drift}- GWToolboxpp: pinned \`${pinned_gwtb:0:12}\` vs latest \`${latest_gwtb:0:12}\`\n"
          fi

          pinned_pub=$(grep -oP 'VERSION:\s*\Kv[0-9.]+' \
            .github/workflows/publish-registry.yml)
          latest_pub=$(gh api repos/modelcontextprotocol/registry/releases/latest --jq '.tag_name')
          if [ "$pinned_pub" != "$latest_pub" ]; then
            drift="${drift}- mcp-publisher: pinned \`${pinned_pub}\` vs latest \`${latest_pub}\` (bump VERSION + BOTH sha256 digests together)\n"
          fi

          if [ -n "$drift" ]; then
            {
              echo "drift<<EOF"
              echo -e "$drift"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update a drift issue
        if: steps.drift.outputs.drift != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Upstream pin drift detected"
          body=$(printf 'These manual pins (invisible to Dependabot) have drifted from upstream latest:\n\n%b\nSee the manual-pin registry in CLAUDE.md for the bump procedure. This issue is opened by the monthly upstream-pin-check workflow.' "${{ steps.drift.outputs.drift }}")
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
