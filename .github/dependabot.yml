version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Mirrors pnpm 11's own minimumReleaseAge default (1 day, unconfigured by
    # us — see CLAUDE.md). Without this, Dependabot proposes a PR the moment
    # a version publishes, then CI fails with
    # ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION because pnpm won't resolve it
    # yet — a guaranteed-red PR for no reason. Cooldown also delays security
    # PRs by the same day (GitHub's documented default), which is correct
    # here: pnpm would refuse to resolve a <24h-old patched version anyway,
    # so proposing it sooner would just fail the same way.
    cooldown:
      default-days: 1
    commit-message:
      prefix: deps # matches the release-please changelog "Dependencies" section
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci # hidden from the changelog, like all ci: commits
    groups:
      actions:
        patterns: ["*"]
