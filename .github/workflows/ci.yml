name: CI
on:
  push:
    branches: [main]
  pull_request:
# Least privilege: CI only reads the repo. Fork PRs get a read-only token
# from GitHub regardless; this makes the same guarantee explicit for pushes.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # No version here: pnpm/action-setup reads the packageManager field
      # from package.json (specifying both makes the action fail).
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm --filter @gw1-mcp/gw-worker check
      - run: node scripts/check-server-json.mjs # MCP Registry schema constraints
      - name: Lint workflows (actionlint)
        # Catches invalid workflow expressions (e.g. inputs.* in a job-level
        # permissions block) before they reach main.
        uses: raven-actions/actionlint@v2
