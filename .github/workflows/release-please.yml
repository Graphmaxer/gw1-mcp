name: Release Please
# Maintains the release PR from conventional commits; when the merge of that
# PR creates a release, sibling jobs in THIS run publish to the MCP Registry
# and attach the plugin DLL — via reusable workflows (uses:). They must be
# chained here by needs/if: events created by release-please (the release,
# the tag) never trigger separate on-release workflows.
on:
  push:
    branches: [main]
# release-please job only needs to open PRs / push tags; the reusable
# publish-registry and plugin jobs declare their own (id-token, contents).
permissions:
  contents: write
  pull-requests: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          # With DATA_BOT_PAT the release PR is authored by a real identity:
          # no bot-approval gate, and CI/CodeQL trigger on it normally.
          # Falls back to the workflow token if the secret is absent.
          token: ${{ secrets.DATA_BOT_PAT || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # User-facing DLL: rebuilt and attached to every release so players
  # download it from the Releases page (Actions artifacts expire after 90
  # days and require a GitHub login). Runs here because release-please
  # creates releases with GITHUB_TOKEN, whose events cannot trigger the
  # standalone plugin workflow.
  # Reuses the plugin build workflow (single source for the vcpkg toolchain)
  # and asks it to upload the DLL straight onto the freshly created release.
  attach-plugin-to-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/build-gwtoolbox-plugin.yml
    permissions:
      contents: write
    with:
      release_tag: ${{ needs.release-please.outputs.tag_name }}

  # Reuses the registry publish workflow (single source; best-effort inside).
  publish-registry:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/publish-registry.yml
    permissions:
      id-token: write
      contents: read
